<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temporarily Unavailable — Caffeine Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1209;
      color: #f5e6d3;
      font-family: 'Inter', sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      text-align: center;
      background: #2d1f0f;
      border: 1px solid rgba(200, 169, 126, 0.25);
      border-radius: 16px;
      padding: 48px 36px;
    }
    .mark {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      color: #c8a97e;
      border: 1px solid #c8a97e;
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      color: #c8a97e;
      margin-bottom: 16px;
    }
    p { line-height: 1.7; color: #d4c4a8; margin-bottom: 12px; }
    .timer {
      font-size: 32px;
      font-weight: 600;
      color: #e8d5b7;
      margin: 24px 0;
      font-variant-numeric: tabular-nums;
    }
    .note { font-size: 13px; color: #a89070; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="mark">SECURITY LOCK</span>
    <h1>We'll Be Right Back</h1>
    <p>Our website is temporarily locked due to multiple failed admin login attempts.</p>
    <p>Access will be restored automatically in:</p>
    <div class="timer" id="timer">--:--</div>
    <p class="note">If you are the site owner, check your email for a security alert.</p>
  </div>
  <script>
    async function updateTimer() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (!data.locked) {
          window.location.href = '/';
          return;
        }
        let remaining = data.remainingMs;
        const el = document.getElementById('timer');
        const tick = () => {
          if (remaining <= 0) {
            window.location.href = '/';
            return;
          }
          const min = Math.floor(remaining / 60000);
          const sec = Math.floor((remaining % 60000) / 1000);
          el.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
          remaining -= 1000;
        };
        tick();
        setInterval(tick, 1000);
      } catch {
        document.getElementById('timer').textContent = '10:00';
      }
    }
    updateTimer();
  </script>
</body>
</html>
